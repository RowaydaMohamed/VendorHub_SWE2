server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/admin/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**, /api/favorites/**, /api/reviews/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**, /ws/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5174"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

jwt:
  secret: VendorHubSuperSecretKeyForJWT2024VendorHubSuperSecretKeyForJWT2024

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
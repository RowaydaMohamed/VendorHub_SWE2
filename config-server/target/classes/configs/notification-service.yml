server:
  port: 8084

spring:
  datasource:
    url: jdbc:h2:mem:notifdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  secret: VendorHubSuperSecretKeyForJWT2024VendorHubSuperSecretKeyForJWT2024

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true